server:
  port: 8120
  address: 0.0.0.0

spring:
  application:
    name: analytics-service
  kafka:
    producer:
      properties:
        max.block.ms: 5000
    properties:
      request.timeout.ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
