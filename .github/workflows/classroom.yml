name: GitHub Classroom Workflow
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
      cars: ${{ steps.filter.outputs.cars }}
      rental: ${{ steps.filter.outputs.rental }}
      payment: ${{ steps.filter.outputs.payment }}
      statistics: ${{ steps.filter.outputs.statistics }}
      logging: ${{ steps.filter.outputs.logging }}
      auth: ${{ steps.filter.outputs.auth }}
      analytics: ${{ steps.filter.outputs.analytics }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            infrastructure:
              - 'k8s-cluster/charts/infrastructure/**'
            cars:
              - 'cars-service/**'
              - 'k8s-cluster/values/cars.yaml'
              - 'k8s-cluster/charts/microservice/**'
            rental:
              - 'rental-service/**'
              - 'k8s-cluster/values/rental.yaml'
              - 'k8s-cluster/charts/microservice/**'
            payment:
              - 'payment-service/**'
              - 'k8s-cluster/values/payment.yaml'
              - 'k8s-cluster/charts/microservice/**'
            statistics:
              - 'statistics-service/**'
              - 'k8s-cluster/values/statistics.yaml'
              - 'k8s-cluster/charts/microservice/**'
            logging:
              - 'logging-service/**'
              - 'k8s-cluster/values/logging.yaml'
              - 'k8s-cluster/charts/microservice/**'
            auth:
              - 'auth-service/**'
              - 'k8s-cluster/values/auth.yaml'
              - 'k8s-cluster/charts/microservice/**'
            analytics:
              - 'analytics-service/**'
              - 'k8s-cluster/values/analytics.yaml'
              - 'k8s-cluster/charts/microservice/**'
            gateway:
              - 'gateway-service/**'
              - 'k8s-cluster/values/gateway.yaml'
              - 'k8s-cluster/charts/microservice/**'

  deploy-infra:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.infrastructure == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cloud.ru login plugin
        run: |
          curl -LO https://github.com/cloud-ru-tech/cloudlogin/releases/latest/download/cloudlogin_Linux_amd64.tar.gz
          tar -xzf cloudlogin_Linux_amd64.tar.gz
          sudo mv cloudlogin /usr/local/bin/
          cloudlogin help

      - name: Set up Kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up old conflicting resources
        run: |
          kubectl delete service postgres --ignore-not-found=true
          kubectl delete service kafka --ignore-not-found=true
          
          kubectl delete deployment postgres --ignore-not-found=true
          kubectl delete deployment kafka --ignore-not-found=true

      - name: Deploy Infrastructure
        run: |
          helm uninstall infrastructure --wait || true
          helm dependency build k8s-cluster/charts/infrastructure
          helm upgrade --install infrastructure k8s-cluster/charts/infrastructure \
            -f k8s-cluster/charts/infrastructure/values.yaml \
            --wait --timeout 15m

      - name: Debug Infra Failure
        if: always()
        run: |
          kubectl get pods -A
          kubectl get events --sort-by='.lastTimestamp'
          kubectl describe pod postgres-0 || true
          kubectl describe pod kafka-0 || true
          kubectl describe pod infrastructure-keycloak-0 || true
          kubectl logs infrastructure-keycloak-0

  build:
    needs: [ detect-changes, deploy-infra ]
    if: always() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: cars
            path: cars-service
          - service: rental
            path: rental-service
          - service: payment
            path: payment-service
          - service: statistics
            path: statistics-service
          - service: logging
            path: logging-service
          - service: auth
            path: auth-service
          - service: gateway
            path: gateway-service
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v2

      - name: Check if changed
        id: check
        run: |
          IS_CHANGED="${{ needs.detect-changes.outputs[matrix.service] }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then IS_CHANGED="true"; fi
          echo "changed=$IS_CHANGED" >> $GITHUB_OUTPUT

      - name: Set up JDK 17 (Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Maven Build & Test
        if: steps.check.outputs.changed == 'true'
        run: |
          # Install shared APIs for gateway and others
          mvn install -pl cars-service/cars-service-api,rental-service/rental-service-api,payment-service/payment-service-api,statistics-service/statistics-service-api,logging-service/logging-service-api,auth-service/auth-service-api -am -DskipTests
          
          cd ${{ matrix.path }}
          mvn clean package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker
        if: steps.check.outputs.changed == 'true'
        run: |
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}-service"
          TAG="${{ github.sha }}"

          if [[ "${{ matrix.service }}" == "gateway" ]]; then
          docker build -f gateway-service/Dockerfile -t $IMAGE_NAME:$TAG .
          else
          cd ${{ matrix.path }}
          docker build -t $IMAGE_NAME:$TAG .
          fi
          docker push $IMAGE_NAME:$TAG

      - name: Install Cloud.ru login plugin
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -LO https://github.com/cloud-ru-tech/cloudlogin/releases/latest/download/cloudlogin_Linux_amd64.tar.gz
          tar -xzf cloudlogin_Linux_amd64.tar.gz
          sudo mv cloudlogin /usr/local/bin/
          cloudlogin help

      - name: Set up Kubectl
        if: steps.check.outputs.changed == 'true'
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Install Helm
        if: steps.check.outputs.changed == 'true'
        uses: azure/setup-helm@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Service
        if: steps.check.outputs.changed == 'true'
        run: |
          helm uninstall ${{ matrix.service }}-service --wait || true
          
          helm upgrade --install ${{ matrix.service }}-service k8s-cluster/charts/microservice \
            -f k8s-cluster/values/${{ matrix.service }}.yaml \
            --set global.imageTag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Debug Logs
        if: always()
        run: |
          kubectl logs -l app=${{ matrix.service }}-service --tail=300 --all-containers=true
          kubectl get pods
          kubectl describe pod -l app=${{ matrix.service }}-service
