global:
  image:
    registry: public.ecr.aws
    pullPolicy: Always
  storageClass: ""

postgresql:
  fullnameOverride: "postgres"

  image:
    registry: public.ecr.aws
    repository: bitnami/postgresql
    tag: "13"

  auth:
    postgresPassword: "postgres"
    username: "postgres"
    database: "postgres"

  architecture: standalone

  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      limits:
        ephemeral-storage: "512Mi"
      requests:
        ephemeral-storage: "256Mi"

    livenessProbe:
      enabled: false
    readinessProbe:
      enabled: false
    startupProbe:
      enabled: false

    initdb:
      scriptsConfigMap: postgres-init-scripts

  volumePermissions:
    enabled: false

kafka:
  fullnameOverride: "kafka"
  image:
    registry: public.ecr.aws
    repository: bitnami/kafka
    tag: "3.7"
  kraft:
    enabled: true
  zookeeper:
    enabled: false

  controller:
    replicaCount: 1
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  broker:
    replicaCount: 1
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1024Mi"
        cpu: "500m"

  listeners:
    client:
      protocol: PLAINTEXT
      port: 9092
    controller:
      protocol: PLAINTEXT
      port: 9093

  persistence:
    enabled: true
  provisionpv:
    enabled: true

keycloak:
  image:
    registry: public.ecr.aws
    repository: bitnami/keycloak
    tag: "22.0.5"
  auth:
    adminUser: admin
    adminPassword: admin
  proxy: edge
  postgresql:
    enabled: false
  externalDatabase:
    host: postgres
    user: postgres
    password: postgres
    database: keycloak

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  command:
    - "/opt/bitnami/keycloak/bin/kc.sh"
    - "start-dev"
    - "--import-realm"

  extraVolumes:
    - name: realm-config
      configMap:
        name: keycloak-realm-config

  extraVolumeMounts:
    - name: realm-config
      mountPath: "/opt/bitnami/keycloak/data/import"
      readOnly: true

  ingress:
    enabled: false

  httpRelativePath: "/auth/"

ingress-nginx:
  controller:
    service:
      type: LoadBalancer
    watchIngressWithoutClass: true
    publishService:
      enabled: true keycloak-realm-config

  extraVolumeMounts:
    - name: realm-config
      mountPath: "/opt/bitnami/keycloak/data/import"
      readOnly: true

  ingress:
    enabled: false

  httpRelativePath: "/auth/"

ingress-nginx:
  controller:
    service:
      type: LoadBalancer
    watchIngressWithoutClass: true
    publishService:
      enabled: true